name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Verify plugin
        run: ./gradlew verifyPlugin

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Read changelog entry
        id: changelog
        run: |
          # Extract content between first and second version header
          body=$(awk '/^## \[/{if (found) exit; found=1; next} found' CHANGELOG.md)
          printf 'body<<CHANGELOG_EOF\n%s\nCHANGELOG_EOF\n' "$body" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Copilot Monitor ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: build/distributions/*.zip
          draft: false
          prerelease: false

      - name: Publish to JetBrains Marketplace
        if: env.PUBLISH_TOKEN != ''
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin
